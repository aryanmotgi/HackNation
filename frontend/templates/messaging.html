<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Negotiations · Lowball</title>
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="stylesheet" href="/static/appshell.css">
  <script src="/static/messaging.js" defer></script>
</head>
<body>
  <div class="shell">
    {% set active = 'negotiations' %}
    {% include '_sidebar.html' %}

    <div class="work">
      <div class="topbar">
        <div class="topbar__crumb"><b>Negotiations</b> · Live agent threads</div>
        <div class="topbar__right">
          <span id="mode-tag" class="mode-tag"><span class="mode-tag__dot"></span> …</span>
          <button id="replay-btn" class="btn" type="button">↻ Replay round</button>
        </div>
      </div>

      <div class="work__body work__body--wide">
        <div class="work__demo">Live negotiations</div>
        <div class="greet">
          <div>
            <h1 class="greet__h">Messaging</h1>
            <p class="greet__sub">Watch the same agent adapt to each customer — reasoning shown under every move.</p>
          </div>
        </div>

        <div id="board" class="board">
          <div class="loading">Loading negotiations…</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
