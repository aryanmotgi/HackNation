<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Memory · Lowball</title>
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="stylesheet" href="/static/appshell.css">
  <script src="/static/vendor/three.min.js"></script>
  <script src="/static/vendor/3d-force-graph.min.js"></script>
  <script src="/static/graph.js" defer></script>
</head>
<body>
  <div class="shell">
    {% set active = 'memory' %}
    {% include '_sidebar.html' %}

    <div class="work">
      <div class="topbar">
        <div class="topbar__crumb"><b>Memory</b> · 3D Kuzu graph</div>
        <div class="topbar__right">
          <span id="mode-tag" class="mode-tag"><span class="mode-tag__dot"></span> …</span>
          <button id="fit" class="btn btn--ghost" type="button">Fit</button>
          <button id="replay" class="btn" type="button">↻ Rebuild</button>
        </div>
      </div>

      <div class="graph-wrap">
        <div id="cy"></div>

        <div class="graph-legend">
          <div class="graph-legend__title">Memory graph · 3D</div>
          <div class="legend-row"><span class="legend-dot" style="background:#0E1512"></span> Manufacturer</div>
          <div class="legend-row"><span class="legend-dot" style="background:var(--green)"></span> Customer</div>
          <div class="legend-row"><span class="legend-dot" style="background:var(--red)"></span> Customer · needs human</div>
          <div class="legend-row"><span class="legend-dot" style="background:#2E7D9A"></span> Deal</div>
          <div class="legend-row"><span class="legend-dot" style="background:#C79A3A"></span> Call</div>
          <div class="legend-row"><span class="legend-dot" style="background:#8B94A3"></span> Pattern</div>
          <div class="legend-row"><span class="legend-line"></span> Lookalike (tactic transfer)</div>
          <div class="legend-hint">Drag to orbit · scroll to zoom · click a node</div>
        </div>

        <div id="detail" class="node-detail">
          <button class="node-detail__close" id="detail-close" aria-label="Close">×</button>
          <div class="node-detail__type" id="detail-type">—</div>
          <div class="node-detail__title" id="detail-title">—</div>
          <div id="detail-body"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
