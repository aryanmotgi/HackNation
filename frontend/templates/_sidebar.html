<script>
  // Keep the Approvals badge in sync on every page that shows the sidebar.
  fetch('/api/sessions').then(function (r) { return r.json(); }).then(function (d) {
    var n = (d.customers || []).filter(function (c) { return c.status === 'needs-human' || c.escalate_flag; }).length;
    var b = document.getElementById('side-approvals');
    if (b) { b.textContent = n; b.hidden = n === 0; }
  }).catch(function () {});
</script>
